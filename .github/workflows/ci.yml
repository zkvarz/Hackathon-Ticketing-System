name: CI

# Build + test both tiers on every push/PR to main (HTS-004, NFR-6). The PR is green only
# if all jobs pass. GitHub's ubuntu runners ship Docker, so the backend's Testcontainers
# integration tests (real Postgres + Mailpit) run out of the box — no extra setup. The `e2e`
# job (HTS-049) boots the full docker-compose stack and runs the Playwright critical-path suite.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (mvnw verify + Testcontainers)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven # caches ~/.m2 keyed on the pom
      - name: Build and test
        run: ./mvnw -B verify

  frontend:
    name: Frontend (build + Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

  e2e:
    name: E2E (Playwright vs docker compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: cp .env.example .env

      - name: Build and start the stack
        run: docker compose up --build -d

      - name: Wait for backend + frontend to be ready
        run: |
          echo "Waiting for backend /api/health…"
          timeout 180 bash -c 'until curl -sf http://localhost:8080/api/health | grep -q UP; do sleep 3; done'
          echo "Waiting for the SPA on :8081…"
          timeout 60 bash -c 'until curl -sf -o /dev/null http://localhost:8081/; do sleep 3; done'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        working-directory: frontend
        run: npm run e2e

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

      - name: Tear down the stack
        if: always()
        run: docker compose down -v
