name: CI

# Build + test both tiers on every push/PR to main (HTS-004, NFR-6). The PR is green only
# if both jobs pass. GitHub's ubuntu runners ship Docker, so the backend's Testcontainers
# integration tests (real Postgres + Mailpit) run out of the box — no extra setup.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (mvnw verify + Testcontainers)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven # caches ~/.m2 keyed on the pom
      - name: Build and test
        run: ./mvnw -B verify

  frontend:
    name: Frontend (build + Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
