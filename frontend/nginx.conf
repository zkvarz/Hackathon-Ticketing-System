# nginx config for the SPA container (used from HTS-003 onward).
# Serves the built SPA with history-API fallback and proxies /api to the backend,
# so the browser sees a same-origin app (simplifies session cookies + CSRF). See architecture.md §4.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing: unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service on the compose network.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
