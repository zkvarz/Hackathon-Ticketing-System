# Production profile (HTS-033). No secret has a default here: every value must come from the
# environment, so a missing secret fails startup (reinforced by RequiredSecretsValidator with a
# clear message). Activate with SPRING_PROFILES_ACTIVE=prod.
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}

server:
  servlet:
    session:
      cookie:
        # HTTPS is assumed in production, so the session cookie is Secure (sent only over TLS).
        secure: true

# API docs are a dev/authoring aid only — never exposed in production (HTS-050). Disabling both the
# spec endpoint and the UI makes /v3/api-docs and /swagger-ui 404; SecurityConfig also drops them
# from the public allowlist when disabled.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
