spring:
  application:
    name: tickets
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tickets}
    username: ${SPRING_DATASOURCE_USERNAME:tickets}
    password: ${SPRING_DATASOURCE_PASSWORD:change-me}
  jpa:
    open-in-view: false
    hibernate:
      # Schema is owned by Flyway (FR-P8); validate that entities match it, never auto-create.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  mvc:
    # Route an unknown path to our exception handler (→ 404 in the standard error model, HTS-031)
    # instead of Boot's Whitelabel page.
    throw-exception-if-no-handler-found: true
  web:
    resources:
      # No static resources are served by the API; disabling the default mapping lets unmatched
      # paths raise NoResourceFoundException (caught by ApiExceptionHandler) rather than 404-ing
      # silently through the resource handler.
      add-mappings: false
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}

server:
  port: 8080
  servlet:
    session:
      # Idle/sliding timeout (AMB-7 / A-3) — the servlet container models only idle timeout. The
      # absolute cap (app.session.absolute-timeout below) is enforced separately by
      # SessionAbsoluteTimeoutFilter (HTS-046).
      timeout: ${APP_SESSION_TIMEOUT_IDLE:30m}
      cookie:
        http-only: true
        same-site: lax
        # secure: true is enabled in the prod profile (application-prod.yml); local dev is HTTP.

# Application-specific config (consumed by later tickets).
app:
  base-url: ${APP_BASE_URL:http://localhost:8081}
  mail:
    from: ${SMTP_FROM:no-reply@tickets.local}
  session:
    idle-timeout: ${APP_SESSION_TIMEOUT_IDLE:30m}
    absolute-timeout: ${APP_SESSION_TIMEOUT_ABSOLUTE:8h}
  verification:
    token-ttl: ${APP_VERIFICATION_TOKEN_TTL:24h}
  password-reset:
    # Shorter TTL than verification: reset links are higher-value and single-use (HTS-037).
    token-ttl: ${APP_PASSWORD_RESET_TOKEN_TTL:1h}
